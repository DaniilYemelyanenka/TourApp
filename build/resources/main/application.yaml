spring:
  application:
    name: tourApp

  datasource:
    url: jdbc:postgresql://localhost:54321/tourDB
    username: user
    password: user
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: ALWAYS
      schema-locations:
        - 'classpath:shema.sql'
        - 'classpath:triggers.sql'
      encoding: 'UTF-8'

